<!DOCTYPE html>
<html>
<head>
  <title>FaceTrace Login</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0f172a; display:flex; align-items:center; justify-content:center; height:100vh; font-family:Arial,sans-serif; }
    .card { background:#1e293b; padding:2.5rem; border-radius:12px; width:360px; }
    h2 { color:#38bdf8; text-align:center; margin-bottom:1.5rem; font-size:1.5rem; }
    input { width:100%; padding:10px 14px; margin-bottom:1rem; border-radius:8px; border:1px solid #334155; background:#0f172a; color:#fff; font-size:14px; }
    button { width:100%; padding:11px; background:#38bdf8; color:#0f172a; font-weight:bold; border:none; border-radius:8px; cursor:pointer; font-size:15px; }
    button:hover { background:#7dd3fc; }
    .error { background:#7f1d1d; color:#fca5a5; padding:8px 12px; border-radius:6px; font-size:13px; margin-bottom:1rem; }
    .logo { text-align:center; font-size:2.5rem; margin-bottom:0.5rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">👁️</div>
    <h2>FaceTrace</h2>
    {% if messages %}
      {% for msg in messages %}
        <div class="error">{{ msg }}</div>
      {% endfor %}
    {% endif %}
    <form method="POST">
      {% csrf_token %}
      <input type="text"     name="username" placeholder="Username" required autofocus>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>
  </div>
</body>
</html>
